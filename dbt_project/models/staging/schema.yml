version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: yellow_trips
        description: Raw NYC TLC yellow taxi trip records

models:
  - name: stg_trips
    description: Cleaned and type-cast NYC taxi trip data
    columns:
      - name: pickup_at
        description: Trip pickup timestamp
        tests:
          - not_null
      - name: dropoff_at
        description: Trip dropoff timestamp
        tests:
          - not_null
      - name: trip_distance_miles
        description: Trip distance in miles
        tests:
          - not_null
      - name: total_amount
        description: Total fare amount
        tests:
          - not_null
      - name: payment_type_id
        description: Payment method code
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
