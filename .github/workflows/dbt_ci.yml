name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python -m py_compile ingestion/download_trips.py
          python -m py_compile dags/nyc_taxi_pipeline.py
          echo "Python syntax OK"

      - name: Validate YAML files
        run: |
          pip install pyyaml -q
          python -c "
          import yaml, glob, sys
          files = glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True)
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f} — {e}')
                  sys.exit(1)
          "

      - name: Validate SQL files exist
        run: |
          find dbt_project/models -name "*.sql" | sort
          echo "SQL models present"
