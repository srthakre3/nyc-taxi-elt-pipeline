name: dbt CI

on:
  push:
    branches: [main]
    paths:
      - 'dbt_project/**'
  pull_request:
    branches: [main]
    paths:
      - 'dbt_project/**'

jobs:
  dbt-compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-postgres==1.8.0

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          nyc_taxi:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: dbt
                password: dbt
                dbname: nyc_taxi
                schema: dbt_ci
                threads: 4
          EOF

      - name: dbt deps
        working-directory: dbt_project
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: dbt_project
        run: dbt compile --target ci
